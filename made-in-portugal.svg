<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 195" width="160" height="195">
  <defs>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#9b1c1c"/>
      <stop offset="45%"  stop-color="#c0272d"/>
      <stop offset="100%" stop-color="#7a1010"/>
    </linearGradient>
    <filter id="badgeShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="rgba(0,0,0,0.40)"/>
    </filter>
    <filter id="ribbonShadow" x="-5%" y="-20%" width="110%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.30)"/>
    </filter>
    <!-- Circular clip to clean up any stray pixels at edge -->
    <clipPath id="badgeCircle">
      <circle cx="80" cy="80" r="76"/>
    </clipPath>
  </defs>

  <!-- Badge image — circular clip -->
  <image
    href="armas-portugal-clean.png"
    x="3" y="3"
    width="154" height="160.6"
    clip-path="url(#badgeCircle)"
    filter="url(#badgeShadow)"
    preserveAspectRatio="xMidYMid meet"
  />

  <!-- Thin gold ring outline over the badge border -->
  <circle cx="80" cy="80" r="76"
          fill="none"
          stroke="#c8a035"
          stroke-width="1.5"
          opacity="0.7"/>

  <!-- ══ Ribbon ══ -->
  <!-- Left tail -->
  <path d="M4,170 L10,163 L10,178 Z" fill="#7a1010"/>
  <!-- Right tail -->
  <path d="M156,170 L150,163 L150,178 Z" fill="#7a1010"/>

  <!-- Main ribbon body -->
  <rect x="8" y="163" width="144" height="17" rx="2" ry="2"
        fill="url(#ribbonGrad)"
        filter="url(#ribbonShadow)"/>

  <!-- Gold top edge -->
  <line x1="10" y1="164.5" x2="150" y2="164.5"
        stroke="#d4a030" stroke-width="1" opacity="0.8"/>
  <!-- Gold bottom edge -->
  <line x1="10" y1="178.5" x2="150" y2="178.5"
        stroke="#d4a030" stroke-width="1" opacity="0.8"/>

  <!-- Ribbon text -->
  <text
    x="80" y="175"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="9.5"
    font-weight="bold"
    letter-spacing="2.2"
    fill="#f7e48a"
    text-anchor="middle"
    dominant-baseline="middle">MADE IN PORTUGAL</text>

  <!-- Small diamond separators flanking text (decorative) -->
  <polygon points="13,171 15,175 13,179 11,175" fill="#d4a030" opacity="0.6"/>
  <polygon points="147,171 149,175 147,179 145,175" fill="#d4a030" opacity="0.6"/>
</svg>
